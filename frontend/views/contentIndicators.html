 <!-- NEW WIDGET START -->
 <article class="col-xs-12 col-sm-12 col-md-12 col-lg-12">
        
        <!-- Widget ID (each widget will need unique ID)-->
        <div class="jarviswidget" data-widget-editbutton="false" data-widget-colorbutton="false" data-widget-deletebutton="false">
            <!-- widget options:
            usage: <div class="jarviswidget" id="wid-id-0" data-widget-editbutton="false">

            data-widget-colorbutton="false"
            data-widget-editbutton="false"
            data-widget-togglebutton="false"
            data-widget-deletebutton="false"
            data-widget-fullscreenbutton="false"
            data-widget-custombutton="false"
            data-widget-collapsed="true"
            data-widget-sortable="false"

            -->
            <header>
                <span class="widget-icon"> <i class="fa fa-bar-chart-o"></i> </span>
                <h2>{{row.location}}</h2>
               
            </header>

            <!-- widget div-->
            <div>

                <!-- widget edit box -->
                <div class="jarviswidget-editbox">
                    <!-- This area used as dropdown edit box -->

                </div>
                <!-- end widget edit box -->

                <!-- widget content -->
                <div class="widget-body">
                    
                    <ul id="myTab{{row.idLocation}}" class="nav nav-tabs bordered">

                        <li class="active">
                            <a href="#tChart{{row.idLocation}}"  target="_self" data-toggle="tab"></i>Geral</a>                                                                    
                        </li>
                        <li>                                    
                            <a  href="#tChartSpecialitys{{row.idLocation}}" target="_self" data-toggle="tab"></i>{{TitleType}}</a>                                                                
                        </li>
                        <li ng-if= "row.locals.length > 0">                                    
                            <a href="#tChartLocals{{row.idLocation}}" target="_self" data-toggle="tab"></i>Localizações</a>                                    
                        </li>
                        <li>                                    
                            <a href="#tTable{{row.idLocation}}" target="_self" data-toggle="tab"></i>Dados</a>                                    
                        </li>

                    </ul>
                    <div id="myTabLancContent1{{row.idLocation}}" class="tab-content padding-10">
                        <div class="tab-pane fade in active" id="tChart{{row.idLocation}}">
                            
                            <section> 
                                    <div ng-if = "Type == 'NExec'">
                                        <canvas height="100" class="chart-line"
                                        chart-data="row.dataNExec" chart-labels="row.labelsNExec" chart-colors="row.colors"
                                        chart-dataset-override="row.datasetOverrideNExec" chart-options="optionsNexe">
                                        </canvas> 
                                    </div>
                                    <div  ng-if = "Type == 'Exec'">
                                           <canvas height="100" class="chart-bar"
                                            chart-data="row.data" chart-labels="row.labels" chart-colors="row.colors"
                                            chart-dataset-override="row.datasetOverride" chart-options="options">
                                          </canvas> 
                                    </div>
                            </section>
                                                                                                            
                        </div>

                        <div class="tab-pane" id="tChartSpecialitys{{row.idLocation}}">
                                                              

                                <section ng-repeat="speciality in row.specialitys">
                                        <!-- Widget ID (each widget will need unique ID)-->
                                        
                                        <div ng-if = "(Type == 'Exec' && speciality.data.length > 0) || (Type == 'NExec' && speciality.dataNExec.length > 0)" class="jarviswidget jarviswidget-color-darken" 
                                        data-widget-editbutton="false" 
                                        data-widget-colorbutton="false" 
                                        data-widget-editbutton="false" 
                                        data-widget-togglebutton="false"
                                        data-widget-deletebutton="false"
                                        data-widget-fullscreenbutton="false"
                                        data-widget-custombutton="false"
                                        data-widget-collapsed="false"
                                        data-widget-sortable="false">
                                                
                                                <header>
                                                    <span class="widget-icon"> <i class="fa fa-bar-chart-o"></i> </span>
                                                    <h2>{{speciality.name}}</h2>
                                
                                                </header>
                                
                                                <!-- widget div-->
                                                <div>
                                
                                                    <!-- widget edit box -->
                                                    <div class="jarviswidget-editbox">
                                                        <!-- This area used as dropdown edit box -->
                                
                                                    </div>
                                                    <!-- end widget edit box -->
                                
                                                    <!-- widget content -->
                                                    <div class="widget-body no-padding">
                                                        <div class="widget-body-toolbar">
                                
                                                        </div>
                                                        <div ng-if = "Type == 'NExec'">
                                                                <canvas height="50" class="chart-bar"
                                                                chart-data="speciality.dataNExec" chart-labels="speciality.labelsNExec" chart-colors="row.colors"
                                                                chart-dataset-override="row.datasetOverrideNExec" chart-options="optionsNexe">
                                                              </canvas> 
                                                        </div>
                                                        <div ng-if = "Type == 'Exec'">
                                                                <canvas height="50" class="chart-bar"
                                                                chart-data="speciality.data" chart-labels="speciality.labels" chart-colors="row.colors"
                                                                chart-dataset-override="row.datasetOverride" chart-options="options">
                                                              </canvas> 
                                                        </div>
                                                      
                                                    </div>
                                                    <!-- end widget content -->
                                
                                                </div>
                                                <!-- end widget div -->
                                
                                        </div>
                                        <!-- end widget -->
                                        
                                       
                                    </section>   
                                                                                                                
                        </div>

                        
                        <div ng-if = "row.locals.length > 0" class="tab-pane" id="tChartLocals{{row.idLocation}}">
                            
                            <section ng-repeat="local in row.locals">
                                <!-- Widget ID (each widget will need unique ID)-->
                                
                                <div ng-if = "(Type == 'Exec' && local.data.length > 0) || (Type == 'NExec' && local.dataNExec.length > 0)" class="jarviswidget jarviswidget-color-darken" 
                                data-widget-editbutton="false" 
                                data-widget-colorbutton="false" 
                                data-widget-editbutton="false" 
                                data-widget-togglebutton="false"
                                data-widget-deletebutton="false"
                                data-widget-fullscreenbutton="false"
                                data-widget-custombutton="false"
                                data-widget-collapsed="false"
                                data-widget-sortable="false">
                                        
                                        <header>
                                            <span class="widget-icon"> <i class="fa fa-bar-chart-o"></i> </span>
                                            <h2>{{local.name}}</h2>

                                        </header>

                                        <!-- widget div-->
                                        <div>

                                            <!-- widget edit box -->
                                            <div class="jarviswidget-editbox">
                                                <!-- This area used as dropdown edit box -->

                                            </div>
                                            <!-- end widget edit box -->

                                            <!-- widget content -->
                                            <div class="widget-body no-padding">
                                                <div class="widget-body-toolbar">

                                                </div>
                                                <div ng-if = "Type == 'NExec'">
                                                        <canvas height="50" class="chart-bar"
                                                        chart-data="local.dataNExec" chart-labels="local.labelsNExec" chart-colors="row.colors"
                                                        chart-dataset-override="row.datasetOverrideNExec" chart-options="optionsNexe">
                                                        </canvas> 
                                                </div>
                                                <div ng-if = "Type == 'Exec'">
                                                        <canvas height="50" class="chart-bar"
                                                        chart-data="local.data" chart-labels="local.labels" chart-colors="row.colors"
                                                        chart-dataset-override="row.datasetOverride" chart-options="options">
                                                        </canvas> 
                                                </div>
                                                
                                            </div>
                                            <!-- end widget content -->

                                        </div>
                                        <!-- end widget div -->

                                </div>
                                <!-- end widget -->
                                
                                
                            </section>   
                                                                              
                        </div>

                        <div class="tab-pane" id="tTable{{row.idLocation}}">
                                <section>
                                    <!-- Widget ID (each widget will need unique ID)-->
                                    <div class="jarviswidget jarviswidget-color-darken" 
                                    data-widget-editbutton="false" 
                                    data-widget-colorbutton="false" 
                                    data-widget-editbutton="false" 
                                    data-widget-togglebutton="false"
                                    data-widget-deletebutton="false"
                                    data-widget-fullscreenbutton="false"
                                    data-widget-custombutton="true"
                                    data-widget-collapsed="false"
                                    data-widget-sortable="false">
                                            
                                            <header>
                                                <span class="widget-icon"> <i class="fa fa-table"></i> </span>
                                                <h2>Dados do último mês</h2>
                            
                                            </header>
                            
                                            <!-- widget div-->
                                            <div>
                            
                                                <!-- widget edit box -->
                                                <div class="jarviswidget-editbox">
                                                    <!-- This area used as dropdown edit box -->
                            
                                                </div>
                                                <!-- end widget edit box -->
                            
                                                <!-- widget content -->
                                                <div class="widget-body no-padding">
                                                    <div class="widget-body-toolbar">
                            
                                                    </div>

                                                    <table ng-table-details="overrideOptions"
                                                    aa-data="row.table"
                                                    ao-column-defs="columnDefs"
                                                    class="table table-striped table-hover">
                                                            <thead>
                                                                <tr>
                                                                    <th>Grupo</th>
                                                                    <th>Centro Custo</th>
                                                                    <th>Tipo</th>
                                                                    <th>Ordem</th>                                                                                                                                                                                                            
                                                                    <th>Descrição</th>
                                                                    <th>Status</th>
                                                                    <th>Local</th>
                                                                    <th>Atividade</th>
                                                                    <th>Especialidade</th>
                                                                    <th>Data Final</th>
                                                                    
                                                                    

                                                                </tr>
                                                            </thead>
                                                            
                                                        </table>
                                                    <!-- <table  ng-datatable-table-tools class="table table-striped table-hover">
                                                        <thead>
                                                            <tr>
                                                                <th>Grupo</th>
                                                                <th>Centro Custo</th>
                                                                <th>Tipo</th>
                                                                <th>Ordem</th>                                                                                                                                                                                                            
                                                                <th>Descrição</th>
                                                                <th>Status</th>
                                                                <th>Local</th>
                                                                <th>Tipo Atividade</th>
                                                                <th>Especialidade</th>
                                                                <th>Data Final</th>
                                                                <th>Data Ref.</th>
                                                                

                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            <tr ng-repeat="rowTable in row.table">
                                                                    <td>{{rowTable.Plant}}</td>
                                                                    <td>{{rowTable.CenterCost}}</td>
                                                                    <td>{{rowTable.Type}}</td>
                                                                    <td>{{rowTable.idOrder}}</td>                                                                                                                                                                                                            
                                                                    <td>{{rowTable.Description}}</td>
                                                                    <td>{{rowTable.Status}}</td>
                                                                    <td>{{rowTable.Location}}</td>
                                                                    <td>{{rowTable.TypeActivity}}</td>
                                                                    <td>{{rowTable.speciality.Name}}</td>
                                                                    <td>{{rowTable.dateEnd}}</td>
                                                                    <td>{{rowTable.dateRef}}</td>
                                                            </tr>                                                                                                                                                                                                                                                                     
                                                        </tbody>
                                                    </table> -->
                            
                                                </div>
                                                <!-- end widget content -->
                            
                                            </div>
                                            <!-- end widget div -->
                            
                                        </div>
                                        <!-- end widget -->
                                        
                                    </div> 
                                </section>   
                        </div>
                    </div>
                </div>
                <!-- end widget content -->

            </div>                               
            <!-- end widget div -->


        </div>
        <!-- end widget -->
                                                                                                             
    </article>
    <!-- WIDGET END -->
