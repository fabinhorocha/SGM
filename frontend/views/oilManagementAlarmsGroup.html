<script type="text/ng-template" id="alarmGroupContent.html">
    <form name="frm" class="smart-form" ng-submit="$ctrl.save()">
            <header>
                <button type="button" class="close" ng-click="$ctrl.cancel()" aria-hidden="true">
                                &times;
                </button>                
                <h4 class="modal-title txt-color-blueDark">
                        <i ng-class = "{
                                'fa-fw fa fa-pencil-square-o': $ctrl.item.action == 'Edit',
                                'fa-fw fa fa-plus-square': $ctrl.item.action == 'Insert'}">
                        </i> 
                        {{$ctrl.item.title}}
                        <span>
                </h4>
            </header>
            <fieldset>
                <section style="width: 80% !important;">
                    <label class="label">Nome</label>
                            <label class="input">
                            <input name="txtName" maxlength="50" 
                            type="text" 
                            class="form-control"  
                            required
                            ng-change="$ctrl.checkChange(null)"
                            ng-model="$ctrl.item.model.Name" capitalize/>
                    </label>
                </section>
                <div class="row">
                    <section class="col col-5">
                        <label class="label">Usuários Disponíveis</label>
                        <!-- <select multiple ng-model="xss" >
                            <option ng-selected="u.selected" ng-repeat="u in xs" value="{{u.value}}">
                                {{u.value}}
                            </option>
                        </select>
                        {{xss | json}} -->
                        <select multiple ng-model="$ctrl.UsersAllSelected" style="min-height: 300px !important; width: 100% !important;">
                            <option ng-selected="u.selected" ng-repeat="u in $ctrl.item.model.UsersAll" value="{{u.idUser}}">
                                {{u.Name}}
                            </option>
                        </select>
                    </section>
                    <section class="col col-1">
                        <div style="margin-top: 80px !important;">
                            <input type="button" class="btn btn-default" style="width: 50px !important;" ng-click="$ctrl.transferToRightAllItems()" value=">>" />
                        </div>
                        <div style="margin-top: 10px !important;">
                            <input type="button" class="btn btn-default" style="width: 50px !important;" ng-click="$ctrl.transferToRightSelectedItems()" value=">" />
                        </div>
                        <div style="margin-top: 10px !important;">
                            <input type="button" class="btn btn-default" style="width: 50px !important;" ng-click="$ctrl.transferToLeftSelectedItems()" value="<" />
                        </div>
                        <div style="margin-top: 10px !important;">
                            <input type="button" class="btn btn-default" style="width: 50px !important;" ng-click="$ctrl.transferToLeftAllItems()" value="<<" />
                        </div>
                    </section>
                    <section class="col col-5">
                        <label class="label">Usuários no Grupo</label>
                        <select multiple ng-model="$ctrl.UsersSelected" style="min-height: 300px !important; width: 100% !important;">
                                <option ng-selected="u.selected" ng-repeat="u in $ctrl.item.model.Users" value="{{u.idUser}}">
                                    {{u.Name}}
                                </option>
                            </select>
                        </section>
                </div>
            </fieldset>
            <footer>
                    <button type="submit" class="btn btn-primary" ng-disabled="$ctrl.saveDisabled">
                    Salvar
                    </button>

                    <button type="button" class="btn btn-default" ng-click="$ctrl.cancel()" >
                    Cancelar
                    </button>
            </footer>
    </form>
            
</script>
